---
layout: default
title: 갤러리
---


<!-- 히어로 배너 -->
<div class="hero-banner">
  <div class="hero-banner-left">
    <h1>갤러리</h1>
  </div>
  <div class="hero-banner-right"></div>
</div>

<!-- 페이지 본문 -->
<div class="page-body">
  <!-- 콘텐츠 레이아웃 -->
  <div class="content-layout">

    <!-- 사이드바 -->
    <aside class="sidebar">
      <h3>Filter</h3>
      
      <div class="filter-group">
        <div class="label-row" style="padding: 11px 14px; border-bottom: 1px solid #e8e8e8;">
          <span style="font-weight: 700;">분류</span>
        </div>
        
        <div class="filter-item has-checks">
          <div class="checkboxes">
            <label><input type="checkbox" class="media-filter" value="이미지" /> 이미지</label>
            <label><input type="checkbox" class="media-filter" value="영상" /> 영상</label>
          </div>
        </div>
      
        <!-- 검색창 -->
        <div style="padding: 14px; border-bottom: 1px solid #e8e8e8;">
          <div class="search-box" style="width: 100%; margin-bottom: 10px;">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="검색" style="width: 100%;" />
          </div>
          <button id="apply-filter" class="btn-apply-filter">적용</button>
        </div>
      </div>

      <!-- 기존 필터들 -->
      <div class="filter-group" style="margin-top: 20px;">
        <div class="filter-item">
          <span>Tea type</span>
          <span class="arrow">▾</span>
        </div>
        <div class="filter-item">
          <span>Size</span>
          <span class="arrow">▾</span>
        </div>
        <div class="filter-item">
          <span>Strength</span>
          <span class="arrow">▾</span>
        </div>
        <div class="filter-item has-checks">
          <div class="label-row">
            <span>Caffeine</span>
          </div>
          <div class="checkboxes">
            <label><input type="checkbox" /> Caffeinated</label>
            <label><input type="checkbox" /> Decaffeinated</label>
          </div>
        </div>
        <div class="filter-item">
          <span>Source</span>
          <span class="arrow">▾</span>
        </div>
      </div>
    </aside>

    <!-- 갤러리 그리드 -->
    <div class="gallery-grid" id="gallery-container">
      {% for post in site.posts %}
        {% if post.images %}
          {% for image in post.images %}
            <div class="gallery-item" data-type="{{ post.type }}" data-title="{{ post.title | downcase }}">
              <div class="gallery-thumb">
                <img src="{{ image }}" alt="{{ post.title }}" style="width:100%; height:100%; object-fit:cover;" />
              </div>
              <p class="gallery-item-title">{{ post.title }}</p>
              <a class="gallery-item-link" href="/bloodpunk_project{{ post.url }}">게시물로</a>
            </div>
          {% endfor %}
        {% endif %}
      {% endfor %}
    </div>

  </div>
</div>

<!-- 필터링 스크립트 -->
<script>
  const applyBtn = document.getElementById('apply-filter');
  const searchInput = document.getElementById('search-input');
  const mediaFilterCheckboxes = document.querySelectorAll('.media-filter');
  const galleryContainer = document.getElementById('gallery-container');
  const galleryItems = galleryContainer.querySelectorAll('.gallery-item');

  applyBtn.addEventListener('click', filterGallery);
  searchInput.addEventListener('keyup', function(e) {
    if (e.key === 'Enter') filterGallery();
  });

  function filterGallery() {
    const searchKeyword = searchInput.value.toLowerCase();
    const selectedTypes = Array.from(mediaFilterCheckboxes)
      .filter(cb => cb.checked)
      .map(cb => cb.value);

    galleryItems.forEach(item => {
      const itemType = item.getAttribute('data-type');
      const itemTitle = item.getAttribute('data-title');

      // 타입 필터링
      const typeMatch = selectedTypes.length === 0 || selectedTypes.includes(itemType);

      // 검색어 필터링
      const searchMatch = searchKeyword === '' || itemTitle.includes(searchKeyword);

      // 둘 다 만족하면 표시
      if (typeMatch && searchMatch) {
        item.style.display = 'block';
      } else {
        item.style.display = 'none';
      }
    });
  }
</script>
