<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>갤러리</title>
  <link rel="stylesheet" href="/bloodpunk_project/assets/css/style.css">
</head>
<body>

  <!-- 공지 바 -->
  <div class="announcement-bar">
    개발중인 페이지 입니다! 사이트가 불안정 할 수 있습니다!
  </div>

  <!-- 히어로 배너 -->
  <div class="hero-banner">
    <div class="hero-banner-left">
      <h1>Green Tea<br>Selection</h1>
    </div>
    <div class="hero-banner-right"></div>
  </div>

  <!-- 페이지 본문 -->
  <div class="page-body">

    <!-- 필터 바 -->
    <div class="filter-bar">
      <span class="filter-label">Filter</span>
      <div class="filter-tabs">
        <button class="tab-btn">이미지</button>
        <button class="tab-btn active">영상</button>
      </div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search product" />
      </div>
    </div>

    <!-- 콘텐츠 레이아웃 -->
    <div class="content-layout">

      <!-- 사이드바 -->
      <aside class="sidebar">
        <div class="filter-group">
          <div class="filter-item">
            <span>Tea type</span>
            <span class="arrow">▾</span>
          </div>
          <div class="filter-item">
            <span>Size</span>
            <span class="arrow">▾</span>
          </div>
          <div class="filter-item">
            <span>Strength</span>
            <span class="arrow">▾</span>
          </div>
          <div class="filter-item has-checks">
            <div class="label-row">
              <span>Caffeine</span>
              <span class="arrow">▴</span>
            </div>
            <div class="checkboxes">
              <label><input type="checkbox" /> Caffeinated</label>
              <label><input type="checkbox" /> Decaffeinated</label>
            </div>
          </div>
          <div class="filter-item">
            <span>Source</span>
            <span class="arrow">▾</span>
          </div>
        </div>
      </aside>

      <!-- 갤러리 그리드 -->
      <div class="gallery-grid">
  {% for post in site.posts %}
    {% if post.images %}
      {% for image in post.images %}
        <div class="gallery-item">
          <div class="gallery-thumb">
            <img src="{{ image }}" alt="{{ post.title }}" style="width:100%; height:100%; object-fit:cover;" />
          </div>
          <p class="gallery-item-title">{{ post.title }}</p>
          <a class="gallery-item-link" href="{{ post.url }}">게시물로</a>
        </div>
      {% endfor %}
    {% endif %}
  {% endfor %}
</div>

</body>
</html>
