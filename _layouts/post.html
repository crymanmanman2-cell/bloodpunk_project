<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>{{ page.title }} | BLOODPUNK </title>
  <link rel="stylesheet" href="/bloodpunk_project/assets/css/style.css">
  <style>
  .post-detail-content img {
    max-width: 600px;
    height: auto;
    display: block;
    margin: 0 auto;
  }
</style>
</head>
<body>
  <nav>
  <div class="logo-box">Logo</div>
  <ul class="nav-links">
    <li><a href="/bloodpunk_project/" class="{% if page.url == '/bloodpunk_project/' %}active{% endif %}">메인</a></li>
    <li><a href="/bloodpunk_project/개발노트.html" class="{% if '개발노트' == page.url | split: '/' | last | split: '.' | first %}active{% endif %}">개발노트</a></li>
    <li><a href="/bloodpunk_project/설정집.html" class="{% if '설정집' == page.url | split: '/' | last | split: '.' | first %}active{% endif %}">설정집</a></li>
    <li><a href="/bloodpunk_project/갤러리.html" class="{% if '갤러리' == page.url | split: '/' | last | split: '.' | first %}active{% endif %}">갤러리</a></li>
    <li><a href="/bloodpunk_project/코멘트.html" class="{% if '코멘트' == page.url | split: '/' | last | split: '.' | first %}active{% endif %}">코멘트</a></li>
  </ul>
</nav>
  <div class="announcement-bar">
    개발중인 페이지 입니다! 사이트가 불안정 할 수 있습니다!
  </div>


  <!-- 히어로 배너 -->
  <div class="hero-banner"></div>

  <!-- 페이지 본문 -->
  <div class="page-body">

  <div class="post-detail">
    <!-- 뒤로가기 -->
    <a class="back-btn" href="/bloodpunk_project/개발노트.html">← 개발노트로 돌아가기</a>

    <!-- 날짜 -->
    <p class="post-detail-date">{{ page.date | date: "%Y년 %m월 %d일 :" }}</p>

    <!-- 제목 -->
    <h1 class="post-detail-title">{{ page.title }}</h1>

    <!-- .md 본문 내용 자동 삽입 -->
    <div class="post-detail-content">
      {{ content }}
    </div>
  </div>

  
</body>
</html>
