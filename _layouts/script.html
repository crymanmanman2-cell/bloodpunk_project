<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>{{ page.title }} | BLOODPUNK </title>
  <link rel="stylesheet" href="/bloodpunk_project/assets/css/style.css">
</head>
<body>


  <!-- 히어로 배너 -->
  <div class="hero-banner"></div>

  <!-- 페이지 본문 -->
  <div class="page-body">

    <!-- 필터 탭 바 -->
    <div class="filter-bar">
      <div class="filter-tabs">
        <button class="tab-btn active">주요 업데이트</button>
        <button class="tab-btn">버그 수정</button>
        <button class="tab-btn">개발 목표</button>
      </div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search product" />
      </div>
    </div>

  <div class="post-detail">
    <!-- 뒤로가기 -->
    <a class="back-btn" href="/bloodpunk_project/개발노트.html">← 개발노트로 돌아가기</a>

    <!-- 날짜 -->
    <p class="post-detail-date">{{ page.date | date: "%Y년 %m월 %d일 :" }}</p>

    <!-- 제목 -->
    <h1 class="post-detail-title">{{ page.title }}</h1>

    <!-- .md 본문 내용 자동 삽입 -->
    <div class="post-detail-content">
      {{ content }}
    </div>
  </div>

  <!-- 푸터 -->
  

</body>
</html>
