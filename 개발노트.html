---
layout: default
title: BLOODPUNK
---


<!-- 히어로 배너 -->
<div class="hero-banner">
  <div class="hero-banner-left">
    <h1>개발노트</h1>
  </div>
  <div class="hero-banner-right"></div>
</div>

<!-- 페이지 본문 -->
<div class="page-body">
  <div class="content-layout">

    <!-- 사이드바 -->
    <aside class="sidebar">
      <h3>Filter</h3>
      
      <!-- 카테고리 필터 -->
      <div class="filter-group">
        <div class="label-row" style="padding: 11px 14px; border-bottom: 1px solid #e8e8e8;">
          <span style="font-weight: 700;">분류</span>
        </div>
        
        <div class="filter-item has-checks">
          <div class="checkboxes">
            <label><input type="checkbox" class="category-filter" value="주요업데이트" /> 중요 업데이트</label>
            <label><input type="checkbox" class="category-filter" value="버그수정" /> 버그 수정</label>
            <label><input type="checkbox" class="category-filter" value="개발목표" /> 개발 예정</label>
          </div>
        </div>
      
        <!-- 검색창 -->
        <div style="padding: 14px; border-bottom: 1px solid #e8e8e8;">
          <div class="search-box" style="width: 100%; margin-bottom: 10px;">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="검색" style="width: 100%;" />
          </div>
          <button id="apply-filter" class="btn-apply-filter">적용</button>
        </div>
      </div>
    </aside>

    <!-- 포스트 목록 (사이드바 밖에!) -->
    <div class="posts-list" id="posts-container">
      {% for post in site.posts %}
    
        <div class="post-card" data-category="{{ post.category }}" data-title="{{ post.title | downcase }}">
          <p class="post-title">{{ post.date | date: "%m월%d일: " }} {{ post.title }}</p>
    
          {% if post.thumb %}
            <div class="post-body-media">
              <div class="post-thumb">
                <img src="{{ post.thumb }}" alt="{{ post.title }}" style="width:100%; height:100%; object-fit:cover;" />
              </div>
              <div class="post-content-box">{{ post.excerpt | strip_html | truncate: 150}}</div>
            </div>
    
          {% else %}
            <div class="post-body-text">{{ post.excerpt | strip_html | truncate: 200}}</div>
    
          {% endif %}
    
          <a class="post-more" href="{{ post.url | relative_url }}">자세히</a>
        </div>
    
      {% endfor %}
    </div>

  </div> <!-- content-layout -->
</div> <!-- page-body -->

<script>
  const applyBtn = document.getElementById('apply-filter');
  const searchInput = document.getElementById('search-input');
  const categoryCheckboxes = document.querySelectorAll('.category-filter');
  const postsContainer = document.getElementById('posts-container');
  const postCards = postsContainer.querySelectorAll('.post-card');

  applyBtn.addEventListener('click', filterPosts);
  searchInput.addEventListener('keyup', function(e) {
    if (e.key === 'Enter') filterPosts();
  });

  function filterPosts() {
    const searchKeyword = searchInput.value.toLowerCase();
    const selectedCategories = Array.from(categoryCheckboxes)
      .filter(cb => cb.checked)
      .map(cb => cb.value);

    postCards.forEach(card => {
      const cardCategory = card.getAttribute('data-category');
      const cardTitle = card.getAttribute('data-title');

      const categoryMatch = selectedCategories.length === 0 || selectedCategories.includes(cardCategory);
      const searchMatch = searchKeyword === '' || cardTitle.includes(searchKeyword);

      if (categoryMatch && searchMatch) {
        card.style.display = 'block';
      } else {
        card.style.display = 'none';
      }
    });
  }
</script>
